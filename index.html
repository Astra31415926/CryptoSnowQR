<!doctype html>
<html lang="uk" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>CryptoSeal — Skeleton</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #0d0a08;
      font-family: sans-serif;
    }

    /* Единый стиль для всех «голых» блоков-заглушек */
    .skeleton-box {
      border: 1px solid rgba(201, 168, 118, 0.6);
      background-color: rgba(201, 168, 118, 0.05);
      box-sizing: border-box;
    }

    /* ===================== ГАЛЕРЕЯ ===================== */
    .gallery-col {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      flex-shrink: 0;
    }
    .thumb-row {
      display: flex;
      flex-direction: row;
      gap: 12px;
    }
    .gallery-thumb {
      width: clamp(80px, 10vh, 140px);
      height: clamp(80px, 10vh, 140px);
      border-radius: 12px;
      flex-shrink: 0;
    }
    .info-panel {
      min-height: 92px;
      width: 360px;
    }
    @media (max-width: 1500px) {
      .gallery-thumb { width: 80px; height: 80px; }
      .info-panel { width: 260px; }
    }

    /* ===================== МОБИЛЬНАЯ АДАПТАЦИЯ ===================== */
    @media (max-width: 760px) {
      body { padding: 0; }

      #artifact {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        width: 100% !important;
        max-width: 100% !important;
        min-width: 0 !important;
        aspect-ratio: auto !important;
        height: auto !important;
        min-height: 100vh;
        border-radius: 0;
        border-width: 0;
        padding: 1.5rem 1.1rem calc(2rem + env(safe-area-inset-bottom, 0px));
        gap: 1.1rem;
      }

      .m-block {
        position: static !important;
        left: auto !important;
        top: auto !important;
        right: auto !important;
        bottom: auto !important;
        width: 100% !important;
        height: auto !important;
        margin: 0 !important;
      }

      #title-block { order: 1; height: 60px !important; }
      #qr-box { order: 2; aspect-ratio: 1 / 1; width: 78% !important; max-width: 320px; margin: 0 auto !important; }
      #text-field { order: 3; height: 60px !important; }
      #pass-field { order: 5; height: 54px !important; }
      #scan-row { order: 6; height: 48px !important; }

      #page-wrap { flex-direction: column; }
      #gallery-left { order: -1; }
      #gallery-right { order: 99; }
      .gallery-col { width: 100% !important; }
      .thumb-row { overflow-x: auto; justify-content: center; }
      .info-panel { display: none; }
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-2 md:p-6 select-none overflow-hidden">

  <div id="page-wrap" class="flex items-center justify-center gap-6 w-full max-w-[2100px]">

    <!-- Галерея слева -->
    <div class="gallery-col" id="gallery-left">
      <div class="thumb-row">
        <div class="gallery-thumb skeleton-box"></div>
        <div class="gallery-thumb skeleton-box"></div>
        <div class="gallery-thumb skeleton-box"></div>
      </div>
      <div class="info-panel skeleton-box"></div>
    </div>

    <!-- Артефакт -->
    <div
      id="artifact"
      class="relative overflow-hidden rounded-2xl"
      style="height: min(82vh, 760px); aspect-ratio: 16 / 9; max-width: 1450px; min-width: 560px; border: 10px solid rgba(201,168,118,0.5);"
    >
      <!-- Кнопка языка -->
      <div class="skeleton-box absolute" style="top: 3%; left: 3%; width: 40px; height: 30px;"></div>

      <!-- Кнопка темы -->
      <div class="skeleton-box absolute rounded-full" style="top: 3%; right: 3%; width: 34px; height: 34px;"></div>

      <!-- Заголовок -->
      <div id="title-block" class="m-block skeleton-box absolute" style="top: 5%; left: 10%; width: 80%; height: 10%;"></div>

      <!-- Поле текста -->
      <div id="text-field" class="m-block skeleton-box absolute" style="left: 26.5%; top: 17%; width: 47.2%; height: 9%;"></div>

      <!-- Квадрат орнамента -->
      <div id="qr-box" class="m-block skeleton-box absolute" style="left: 39.1%; top: 32%; width: 22.1%; height: 32%;"></div>

      <!-- Поле ключа -->
      <div id="pass-field" class="m-block skeleton-box absolute" style="left: 26.5%; top: 68%; width: 47.2%; height: 8%;"></div>

      <!-- Кнопка(-и) снизу: «Сканировать» / ряд из трёх иконок — занимают одно и то же место -->
      <div id="scan-row" class="m-block skeleton-box absolute" style="left: 39.1%; bottom: 4%; width: 22.1%; height: 8%;"></div>
    </div>

    <!-- Галерея справа -->
    <div class="gallery-col" id="gallery-right">
      <div class="thumb-row">
        <div class="gallery-thumb skeleton-box"></div>
        <div class="gallery-thumb skeleton-box"></div>
        <div class="gallery-thumb skeleton-box"></div>
      </div>
      <div class="info-panel skeleton-box"></div>
    </div>

  </div>

</body>
</html>
