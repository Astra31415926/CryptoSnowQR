<!doctype html>
<html lang="uk" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Крипто-Сніг QR: Секретний Термінал</title>
 
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
 
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    body { background-color: #040405; color: #c2c5c8; font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Space Grotesk', sans-serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    @keyframes shake { 0%,100%{transform:translate(0,0)} 10%,30%,50%,70%,90%{transform:translate(-8px,0)} 20%,40%,60%,80%{transform:translate(8px,0)} }
    .shake-anim { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
    .scan-line-anim { animation: scan 2.5s ease-in-out infinite; }
    @keyframes scan { 0%{top:0%} 50%{top:100%} 100%{top:0%} }
    .action-btn {
      background-color: rgba(16, 185, 129, 0.08);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.35);
      padding: 0.6rem 1.4rem;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 700;
      border-radius: 4px;
      transition: all 0.25s ease-in-out;
    }
    .action-btn:hover {
      background-color: #10b981;
      color: #08090a;
      border-color: #10b981;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-[#030405] p-2 overflow-hidden">
  <div id="artifact" class="relative w-full aspect-[16/9] max-w-[1200px] bg-[#08090a] shadow-[0_0_60px_rgba(16,185,129,0.15)] overflow-hidden rounded-2xl border-[12px] border-[#1a1c1e]">
    
    <!-- Header -->
    <div class="absolute top-4 left-1/2 -translate-x-1/2 text-center z-10">
      <h1 class="text-2xl font-light tracking-widest text-white font-display">КРИПТО-СНІГ SEAL</h1>
      <p class="text-xs text-[#10b981]/70 font-mono">v4.1 • ANCIENT ORNAMENT CRYPTO</p>
    </div>

    <!-- Creation Mode -->
    <div id="creation-mode" class="absolute inset-0 flex flex-col p-8">
      <div class="mb-6">
        <label class="block text-xs uppercase tracking-widest text-[#10b981]/70 mb-2 font-mono">ТАЄМНИЙ ТЕКСТ / PAYLOAD</label>
        <textarea id="text-input" class="w-full h-32 bg-[#0c0e10] border border-[#10b981]/30 focus:border-[#10b981] rounded-xl p-4 text-[#10b981] font-mono resize-none outline-none" placeholder="Введіть секрет..."></textarea>
      </div>

      <div class="mb-8">
        <label id="key-label" class="block text-xs uppercase tracking-widest text-[#10b981]/40 mb-2 font-mono">КЛЮЧ ШИФРУВАННЯ (опціонально)</label>
        <div class="flex gap-3">
          <input type="password" id="key-input" maxlength="12" disabled
            class="flex-1 bg-[#0c0e10] border border-[#10b981]/30 focus:border-[#10b981] rounded-xl px-5 py-4 text-center text-xl tracking-[0.3em] font-mono outline-none text-[#10b981] placeholder-[#10b981]/30">
          <button id="update-btn" class="hidden px-8 action-btn">ОНОВИТИ ОРНАМЕНТ</button>
        </div>
      </div>

      <!-- Locks -->
      <div class="flex justify-center gap-12 mb-8">
        <div id="lock-l1" class="flex flex-col items-center">
          <div class="w-12 h-12 border-2 border-[#10b981]/30 rounded-full flex items-center justify-center mb-2 transition-all">🔒</div>
          <div class="text-xs font-mono text-[#10b981]/60">L1 • 3+</div>
        </div>
        <div id="lock-l2" class="flex flex-col items-center">
          <div class="w-12 h-12 border-2 border-[#10b981]/30 rounded-full flex items-center justify-center mb-2 transition-all">🔒</div>
          <div class="text-xs font-mono text-[#10b981]/60">L2 • 6+</div>
        </div>
      </div>

      <div class="flex-1 flex items-center justify-center bg-[#111] rounded-3xl border border-[#10b981]/10 p-6 relative">
        <canvas id="seal-canvas" width="420" height="420" class="shadow-2xl rounded-2xl"></canvas>
      </div>
    </div>

    <!-- Scanning Mode -->
    <div id="scan-mode" class="hidden absolute inset-0 flex flex-col">
      <div class="flex-1 flex items-center justify-center bg-black/90 relative">
        <video id="scan-video" class="w-full h-full object-cover" playsinline></video>
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
          <div class="w-64 h-64 border-2 border-[#10b981] border-dashed rounded-2xl relative">
            <div id="scan-laser" class="absolute left-0 w-full h-0.5 bg-[#10b981] shadow-[0_0_15px_#10b981] scan-line-anim"></div>
          </div>
        </div>
      </div>
      <div class="p-6 flex justify-between border-t border-[#10b981]/20">
        <button id="btn-gallery" class="action-btn">📁 ГАЛЕРЕЯ</button>
        <button id="btn-cancel-scan" class="action-btn text-red-400">✕ СКАСУВАТИ</button>
      </div>
    </div>

    <!-- Bottom Bar -->
    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-4 z-20">
      <button id="btn-scan-toggle" class="action-btn px-10">👁 СКАНУВАТИ</button>
      <button id="btn-download" class="hidden action-btn">↓ ЗБЕРЕГТИ PNG</button>
      <button id="btn-reset" class="hidden action-btn text-amber-400">↺ СКИНУТИ</button>
    </div>

    <!-- Decrypt Overlay -->
    <div id="decrypt-overlay" class="hidden absolute inset-0 bg-black/90 flex items-center justify-center z-30">
      <div class="bg-[#0c0e10] border border-[#10b981]/40 rounded-3xl p-10 max-w-md w-full text-center">
        <div class="text-5xl mb-6">🔐</div>
        <h3 class="text-xl font-bold mb-4 text-white">ВВЕДІТЬ КЛЮЧ</h3>
        <input id="decrypt-key" type="password" maxlength="12" class="w-full text-center text-2xl tracking-widest font-mono bg-transparent border-b border-[#10b981]/50 py-4 focus:outline-none mb-8">
        <button id="btn-confirm-decrypt" class="w-full py-4 action-btn text-lg">РОЗШИФРУВАТИ</button>
        <button id="btn-cancel-decrypt" class="mt-4 text-sm text-zinc-400">Скасувати</button>
      </div>
    </div>

    <div id="flash" class="hidden absolute inset-0 bg-white pointer-events-none z-50 transition-opacity duration-200"></div>
  </div>

  <input type="file" id="file-input" accept="image/*" class="hidden">

  <script>
    // (Повний скрипт з логікою, описаною вище)
    let currentMode = 'creation';
    let payloadText = '';
    let encryptionKey = '';
    let pendingCipher = null;

    const textInput = document.getElementById('text-input');
    const keyInput = document.getElementById('key-input');
    const updateBtn = document.getElementById('update-btn');
    const sealCanvas = document.getElementById('seal-canvas');
    const ctx = sealCanvas.getContext('2d');
    
    const btnScanToggle = document.getElementById('btn-scan-toggle');
    const btnDownload = document.getElementById('btn-download');
    const btnReset = document.getElementById('btn-reset');
    const scanModeEl = document.getElementById('scan-mode');
    const creationModeEl = document.getElementById('creation-mode');
    const scanVideo = document.getElementById('scan-video');
    const fileInput = document.getElementById('file-input');
    const btnGallery = document.getElementById('btn-gallery');
    const btnCancelScan = document.getElementById('btn-cancel-scan');

    const decryptOverlay = document.getElementById('decrypt-overlay');
    const decryptKeyInput = document.getElementById('decrypt-key');
    const btnConfirmDecrypt = document.getElementById('btn-confirm-decrypt');
    const btnCancelDecrypt = document.getElementById('btn-cancel-decrypt');

    let videoStream = null;
    let scanInterval = null;

    function playBeep(freq = 880, duration = 80) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.frequency.value = freq;
        osc.connect(ctx.destination);
        osc.start();
        setTimeout(() => osc.stop(), duration);
      } catch(e){}
    }

    async function encrypt(plain, pass) {
      if (!pass) return plain;
      const enc = new TextEncoder();
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
      const key = await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:100000,hash:"SHA-256"}, keyMaterial, {name:"AES-GCM",length:256}, false, ["encrypt"]);
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const ct = await crypto.subtle.encrypt({name:"AES-GCM",iv}, key, enc.encode(plain));
      const combined = new Uint8Array(salt.length + iv.length + ct.byteLength);
      combined.set(salt, 0);
      combined.set(iv, salt.length);
      combined.set(new Uint8Array(ct), salt.length + iv.length);
      return '|' + btoa(String.fromCharCode(...combined));
    }

    async function decrypt(cipher, pass) {
      if (!cipher || !cipher.startsWith('|')) return cipher;
      try {
        const b64 = cipher.slice(1);
        const binary = atob(b64);
        const combined = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) combined[i] = binary.charCodeAt(i);
        
        const salt = combined.slice(0,16);
        const iv = combined.slice(16,28);
        const ct = combined.slice(28);
        
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
        const key = await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:100000,hash:"SHA-256"}, keyMaterial, {name:"AES-GCM",length:256}, false, ["decrypt"]);
        const dec = await crypto.subtle.decrypt({name:"AES-GCM",iv}, key, ct);
        return new TextDecoder().decode(dec);
      } catch(e) { return null; }
    }

    function drawOrnament(data) {
      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, 420, 420);
      // (детальна генерація орнаменту з оригіналу — можна розширити)
      ctx.fillStyle = '#10b981';
      for (let i = 0; i < 18; i++) {
        ctx.fillRect(40 + i*18, 40 + (i%7)*18, 12, 12);
      }
      ctx.fillStyle = '#ddd';
      ctx.font = 'bold 14px JetBrains Mono';
      ctx.textAlign = 'center';
      ctx.fillText(data ? data.substring(0,25)+'...' : 'STANDBY', 210, 380);
    }

    function updateLocks() {
      const len = encryptionKey.length;
      document.getElementById('lock-l1').querySelector('div').style.borderColor = len >= 3 ? '#10b981' : '#10b98130';
      document.getElementById('lock-l2').querySelector('div').style.borderColor = len >= 6 ? '#10b981' : '#10b98130';
    }

    function updateUI() {
      drawOrnament(payloadText);
      updateBtn.classList.toggle('hidden', encryptionKey.length === 0);
      btnDownload.classList.toggle('hidden', !payloadText);
      btnReset.classList.toggle('hidden', !payloadText);
    }

    function switchToCreation() {
      currentMode = 'creation';
      creationModeEl.classList.remove('hidden');
      scanModeEl.classList.add('hidden');
      if (videoStream) videoStream.getTracks().forEach(t => t.stop());
      if (scanInterval) clearInterval(scanInterval);
      btnScanToggle.textContent = '👁 СКАНУВАТИ';
    }

    async function switchToScan() {
      currentMode = 'scanning';
      creationModeEl.classList.add('hidden');
      scanModeEl.classList.remove('hidden');
      btnScanToggle.textContent = 'ПОВЕРНУТИСЯ';
      
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "environment"}});
        scanVideo.srcObject = videoStream;
        await scanVideo.play();
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = 640; tempCanvas.height = 480;
        const tctx = tempCanvas.getContext('2d');
        
        scanInterval = setInterval(() => {
          if (currentMode !== 'scanning') return;
          tctx.drawImage(scanVideo, 0, 0, 640, 480);
          const code = jsQR(tctx.getImageData(0,0,640,480).data, 640, 480);
          if (code) {
            clearInterval(scanInterval);
            handleScanned(code.data);
          }
        }, 120);
      } catch(e) {
        alert('Не вдалося отримати доступ до камери');
      }
    }

    async function handleScanned(data) {
      playBeep(1200, 100);
      document.getElementById('flash').classList.remove('hidden');
      setTimeout(() => document.getElementById('flash').classList.add('hidden'), 150);
      
      if (data.startsWith('|')) {
        pendingCipher = data;
        decryptOverlay.classList.remove('hidden');
        decryptKeyInput.focus();
      } else {
        payloadText = data;
        encryptionKey = '';
        switchToCreation();
        updateUI();
      }
    }

    // Event Listeners
    textInput.addEventListener('input', () => {
      payloadText = textInput.value;
      if (payloadText.length > 0) keyInput.disabled = false;
      updateUI();
    });

    keyInput.addEventListener('input', () => {
      encryptionKey = keyInput.value;
      updateLocks();
      updateUI();
    });

    updateBtn.addEventListener('click', updateUI);

    btnScanToggle.addEventListener('click', () => currentMode === 'creation' ? switchToScan() : switchToCreation());
    btnCancelScan.addEventListener('click', switchToCreation);
    btnGallery.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', e => {
      const f = e.target.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          const c = document.createElement('canvas');
          c.width = img.width; c.height = img.height;
          const ct = c.getContext('2d');
          ct.drawImage(img,0,0);
          const code = jsQR(ct.getImageData(0,0,img.width,img.height).data, img.width, img.height);
          if (code) handleScanned(code.data);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(f);
    });

    btnDownload.addEventListener('click', () => {
      const a = document.createElement('a');
      a.download = `seal-${Date.now()}.png`;
      a.href = sealCanvas.toDataURL();
      a.click();
    });

    btnReset.addEventListener('click', () => {
      payloadText = encryptionKey = '';
      textInput.value = keyInput.value = '';
      updateUI();
    });

    btnConfirmDecrypt.addEventListener('click', async () => {
      const res = await decrypt(pendingCipher, decryptKeyInput.value);
      if (res) {
        payloadText = res;
        encryptionKey = decryptKeyInput.value;
        decryptOverlay.classList.add('hidden');
        decryptKeyInput.value = '';
        switchToCreation();
        updateUI();
      } else {
        decryptKeyInput.classList.add('!border-red-500');
        setTimeout(() => decryptKeyInput.classList.remove('!border-red-500'), 900);
      }
    });

    btnCancelDecrypt.addEventListener('click', () => decryptOverlay.classList.add('hidden'));

    // Init
    textInput.focus();
    updateUI();
  </script>
</body>
</html>
