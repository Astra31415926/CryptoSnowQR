<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoSnowQR Artifact</title>
    <style>
        :root {
            --rune-gold: #d4af37;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a1510;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        /* Главный контейнер 16:9 */
        .crypto-container {
            position: relative;
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background: url('bg.jpg') center/cover no-repeat;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* ТЕКСТОВОЕ ПОЛЕ (СЕКРЕТ) */
        #ui-text {
            position: absolute;
            left: 26.5%;
            top: 21.6%;
            width: 47.2%;
            height: 8.4%;
            font-size: 2vw;
            text-align: center;
            line-height: 1.2;
            background: transparent;
            border: none;
            color: #fff;
            resize: none;
            outline: none;
            font-family: inherit;
            z-index: 5;
        }

        /* ПОЛЕ ПАРОЛЯ */
        #ui-pass {
            position: absolute;
            left: 35%;
            top: 82%;
            width: 30%;
            height: 5.5%;
            font-size: 1.6vw;
            text-align: center;
            letter-spacing: 0.3em;
            background: transparent;
            border: none;
            color: #fff;
            outline: none;
            font-family: inherit;
            z-index: 5;
        }

        /* СЛОИ ДЛЯ ЭФФЕКТОВ ИЗ ДРУГИХ КАРТИНОК */
        .overlay-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        /* Слой с фосфорным текстом из bg3.jpg */
        #title-glow {
            background-image: url('bg3.jpg');
            clip-path: polygon(15% 0%, 85% 0%, 85% 20%, 15% 20%);
            z-index: 2;
        }

        /* Анимация искрения названия при вводе текста */
        .flicker {
            animation: glitchFlicker 0.15s ease-in-out infinite alternate;
        }

        @keyframes glitchFlicker {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Маски для левого замка (Координаты области замка) */
        #lock-left-open-glow {
            background-image: url('bg3.jpg');
            clip-path: polygon(30% 70%, 40% 70%, 40% 92%, 30% 92%);
            z-index: 3;
        }

        /* Маски для правого замка */
        #lock-right-open-glow {
            background-image: url('bg3.jpg');
            clip-path: polygon(60% 70%, 70% 70%, 70% 92%, 60% 92%);
            z-index: 3;
        }

        /* СЛОЙ ДЛЯ РАЗМЫТИЯ ПОДЛОЖКИ ОРНАМЕНТА */
        #canvas-blur-bg {
            position: absolute;
            left: 39.1%;
            top: 35.3%;
            width: 22.1%;
            height: 40.6%;
            z-index: 1;
            pointer-events: none;
            backdrop-filter: blur(0px);
            transition: backdrop-filter 0.6s ease;
        }

        /* КОНТЕЙНЕР ДЛЯ CANVAS ОРНАМЕНТА */
        #ui-qr-wrapper {
            position: absolute !important;
            left: 39.1% !important;
            top: 35.3% !important;
            width: 22.1% !important;
            height: 40.6% !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            pointer-events: none;
            background: transparent !important;
            z-index: 4;
        }

        /* РАССЕЯННЫЙ СВЕТ НА ОРНАМЕНТ */
        #canvas-create {
            width: 100% !important;
            height: auto !important;
            max-width: 100% !important;
            max-height: 100% !important;
            aspect-ratio: 1 / 1 !important;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            mix-blend-mode: soft-light;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .show-canvas {
            opacity: 1 !important;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="artifact" class="crypto-container">
        
        <div id="title-glow" class="overlay-layer"></div>
        <div id="lock-left-open-glow" class="overlay-layer"></div>
        <div id="lock-right-open-glow" class="overlay-layer"></div>
        
        <div id="canvas-blur-bg"></div>

        <textarea id="ui-text" placeholder="Введіть текст таємниці..."></textarea>
        <input type="password" id="ui-pass" placeholder="••••••" maxlength="12">

        <div id="ui-qr-wrapper">
            <canvas id="canvas-create"></canvas>
        </div>

    </div>

    <script>
        // Имитация твоих существующих элементов и функций для связки логики
        const els = {
            text: document.getElementById('ui-text'),
            pass: document.getElementById('ui-pass'),
            titleGlow: document.getElementById('title-glow'),
            lockLeft: document.getElementById('lock-left-open-glow'),
            lockRight: document.getElementById('lock-right-open-glow'),
            blurBg: document.getElementById('canvas-blur-bg'),
            canvas: document.getElementById('canvas-create')
        };

        // Твоя основная функция генерации (заглушка для связки)
        function generateQR() {
            // Здесь работает твой старый JS код генератора.
            // Мы просто плавно отображаем canvas, когда он готов.
            if(els.text.value.trim().length > 0) {
                els.canvas.classList.add('show-canvas');
            } else {
                els.canvas.classList.remove('show-canvas');
            }
        }

        // 1. РЕАКЦИЯ НА ВВОД СЕКРЕТНОГО ТЕКСТА (Вспышки названия)
        let titleTimeout;
        els.text.addEventListener('input', () => {
            els.titleGlow.classList.add('flicker');
            els.titleGlow.style.opacity = '1';
            
            clearTimeout(titleTimeout);
            titleTimeout = setTimeout(() => {
                els.titleGlow.classList.remove('flicker');
                els.titleGlow.style.opacity = '0';
            }, 400); // Гаснет через 0.4 сек после остановки ввода

            generateQR();
        });

        // 2. УПРАВЛЕНИЕ ЗАМКАМИ И РАЗМЫТИЕМ ОТ ДЛИНЫ КЛЮЧА
        els.pass.addEventListener('input', () => {
            const len = els.pass.value.length;

            // Логика Левого Замка
            if (len >= 1 && len <= 2) {
                els.lockLeft.style.opacity = '1'; // Светится открытым (bg3)
            } else {
                els.lockLeft.style.opacity = '0'; // Темный закрытый (bg.jpg)
            }

            // Логика Правого Замка
            if (len >= 4 && len <= 5) {
                els.lockRight.style.opacity = '1'; // Светится открытым (bg3)
            } else {
                els.lockRight.style.opacity = '0'; // Темный закрытый (bg.jpg)
            }

            // Размытие подложки камня при наличии готового шифра (например, от 1 символа)
            if (len > 0 && els.text.value.trim().length > 0) {
                els.blurBg.style.backdropFilter = 'blur(10px)';
            } else {
                els.blurBg.style.backdropFilter = 'blur(0px)';
            }

            generateQR();
        });
    </script>
</body>
</html>
