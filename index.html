<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoSnowQR Artifact</title>
    <style>
        :root {
            --rune-gold: #d4af37;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a1510;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        /* Главный контейнер (Базовый фон теперь bg1.jpg с открытыми замками) */
        .crypto-container {
            position: relative;
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background: url('bg1.jpg') center/cover no-repeat;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* ТЕКСТОВОЕ ПОЛЕ (Смещено ниже, курсор слева, цвет светло-зеленый) */
        #ui-text {
            position: absolute;
            left: 26.5%;
            top: 23.5%; /* Смещено чуть ниже для центра */
            width: 47.2%;
            height: 6.5%;
            font-size: 1.8vw;
            text-align: left; /* Курсор теперь в начале окна */
            padding-left: 1.5vw;
            line-height: 1.2;
            background: transparent;
            border: none;
            color: #7fff00; /* Светло-зеленый цвет текста */
            resize: none;
            outline: none;
            font-family: inherit;
            z-index: 5;
        }

        /* ПОЛЕ ПАРОЛЯ */
        #ui-pass {
            position: absolute;
            left: 35%;
            top: 82%;
            width: 30%;
            height: 5.5%;
            font-size: 1.6vw;
            text-align: center;
            letter-spacing: 0.3em;
            background: transparent;
            border: none;
            color: #7fff00;
            outline: none;
            font-family: inherit;
            z-index: 5;
        }

        /* СЛОИ ДЛЯ ЭФФЕКТОВ */
        .overlay-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
        }

        /* Слой с фосфорным текстом из bg3.jpg */
        #title-glow {
            background-image: url('bg3.jpg');
            clip-path: polygon(15% 0%, 85% 0%, 85% 20%, 15% 20%);
            z-index: 2;
            transition: opacity 0.1s ease-out;
        }

        /* Вспышка до 50% при вводе */
        .flicker-active {
            opacity: 0.5 !important;
        }

        /* Маска для левого замка (Свечение из bg3.jpg) */
        #lock-left-glow {
            background-image: url('bg3.jpg');
            clip-path: polygon(30% 70%, 40% 70%, 40% 92%, 30% 92%);
            z-index: 3;
            transition: opacity 0.3s ease;
        }

        /* Маска для правого замка (Свечение из bg3.jpg) */
        #lock-right-glow {
            background-image: url('bg3.jpg');
            clip-path: polygon(60% 70%, 70% 70%, 70% 92%, 60% 92%);
            z-index: 3;
            transition: opacity 0.3s ease;
        }

        /* Маска для закрытия левого замка (Берется из исходного bg.jpg) */
        #lock-left-closed {
            background-image: url('bg.jpg');
            clip-path: polygon(30% 70%, 40% 70%, 40% 92%, 30% 92%);
            z-index: 3;
            transition: opacity 0.3s ease;
        }

        /* Маска для закрытия правого замка (Берется из исходного bg.jpg) */
        #lock-right-closed {
            background-image: url('bg.jpg');
            clip-path: polygon(60% 70%, 70% 70%, 70% 92%, 60% 92%);
            z-index: 3;
            transition: opacity 0.3s ease;
        }

        /* РАЗМЫТИЕ ПОДЛОЖКИ ОРНАМЕНТА */
        #canvas-blur-bg {
            position: absolute;
            left: 39.1%;
            top: 35.3%;
            width: 22.1%;
            height: 40.6%;
            z-index: 1;
            pointer-events: none;
            backdrop-filter: blur(0px);
            transition: backdrop-filter 0.6s ease;
        }

        /* КОНТЕЙНЕР ДЛЯ CANVAS */
        #ui-qr-wrapper {
            position: absolute !important;
            left: 39.1% !important;
            top: 35.3% !important;
            width: 22.1% !important;
            height: 40.6% !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            pointer-events: none;
            background: transparent !important;
            z-index: 4;
        }

        /* РАССЕЯННЫЙ СВЕТ НА ОРНАМЕНТ */
        #canvas-create {
            width: 100% !important;
            height: auto !important;
            max-width: 100% !important;
            max-height: 100% !important;
            aspect-ratio: 1 / 1 !important;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            mix-blend-mode: soft-light;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .show-canvas {
            opacity: 1 !important;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="artifact" class="crypto-container">
        
        <div id="title-glow" class="overlay-layer"></div>
        <div id="lock-left-glow" class="overlay-layer"></div>
        <div id="lock-right-glow" class="overlay-layer"></div>
        <div id="lock-left-closed" class="overlay-layer"></div>
        <div id="lock-right-closed" class="overlay-layer"></div>
        
        <div id="canvas-blur-bg"></div>

        <textarea id="ui-text" placeholder="Введіть текст таємниці..."></textarea>
        <input type="password" id="ui-pass" placeholder="••••••" maxlength="12">

        <div id="ui-qr-wrapper">
            <canvas id="canvas-create"></canvas>
        </div>

    </div>

    <script>
        const els = {
            text: document.getElementById('ui-text'),
            pass: document.getElementById('ui-pass'),
            titleGlow: document.getElementById('title-glow'),
            lockLeftGlow: document.getElementById('lock-left-glow'),
            lockRightGlow: document.getElementById('lock-right-glow'),
            lockLeftClosed: document.getElementById('lock-left-closed'),
            lockRightClosed: document.getElementById('lock-right-closed'),
            blurBg: document.getElementById('canvas-blur-bg'),
            canvas: document.getElementById('canvas-create')
        };

        // Интеграция вызова отрисовки вашего орнамента
        function generateQR() {
            if(els.text.value.trim().length > 0 && typeof drawOrnament === "function") {
                drawOrnament(); // Вызов вашей функции генерации рисунка
                els.canvas.classList.add('show-canvas');
            } else if (els.text.value.trim().length > 0) {
                // Если функция еще не инициализирована, просто активируем видимость холста
                els.canvas.classList.add('show-canvas');
            } else {
                els.canvas.classList.remove('show-canvas');
            }
        }

        // 1. ОДНО КРАТКОВРЕМЕННОЕ МЕРЦАНИЕ НА 50% ПРИ НАЖАТИИ КЛАВИШИ
        els.text.addEventListener('keydown', () => {
            els.titleGlow.classList.add('flicker-active');
        });

        els.text.addEventListener('keyup', () => {
            setTimeout(() => {
                els.titleGlow.classList.remove('flicker-active');
            }, 50); // Мгновенный сброс яркости обратно
            generateQR();
        });

        // 2. УПРАВЛЕНИЕ ЗАМКАМИ (ПООЧЕРЕДНОЕ ЗАКРЫТИЕ ПРИ ВВОДЕ КЛЮЧА)
        els.pass.addEventListener('input', () => {
            const len = els.pass.value.length;

            // ЛЕВЫЙ ЗАМОК
            if (len >= 1 && len <= 2) {
                els.lockLeftGlow.style.opacity = '1';     // Загорается открытым (bg3)
                els.lockLeftClosed.style.opacity = '0';   
            } else if (len >= 3) {
                els.lockLeftGlow.style.opacity = '0';     // Гаснет открытый
                els.lockLeftClosed.style.opacity = '1';   // Накладывается закрытый замок (bg)
            } else {
                els.lockLeftGlow.style.opacity = '0';     // Исходное состояние (bg1 - открытый темный)
                els.lockLeftClosed.style.opacity = '0';
            }

            // ПРАВЫЙ ЗАМОК
            if (len >= 4 && len <= 5) {
                els.lockRightGlow.style.opacity = '1';    // Загорается открытым (bg3)
                els.lockRightClosed.style.opacity = '0';
            } else if (len >= 6) {
                els.lockRightGlow.style.opacity = '0';    // Гаснет открытый
                els.lockRightClosed.style.opacity = '1';  // Накладывается закрытый замок (bg)
            } else {
                els.lockRightGlow.style.opacity = '0';    // Исходное состояние (bg1 - открытый темный)
                els.lockRightClosed.style.opacity = '0';
            }

            // РАЗМЫТИЕ ПОДЛОЖКИ ОРНАМЕНТА
            if (len > 0 && els.text.value.trim().length > 0) {
                els.blurBg.style.backdropFilter = 'blur(8px)';
            } else {
                els.blurBg.style.backdropFilter = 'blur(0px)';
            }

            generateQR();
        });
    </script>
</body>
</html>
