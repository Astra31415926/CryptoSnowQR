<!doctype html>
<html lang="uk" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Крипто-Сніг QR: Секретний Термінал</title>
  
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Space Grotesk, Inter, JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- CDN dependencies for decoding and encoding QR Codes -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

  <style>
    /* Custom Theme overrides */
    body {
      background-color: #040405;
      color: #c2c5c8;
      font-family: 'Inter', sans-serif;
    }

    .font-sans {
      font-family: 'Inter', sans-serif;
    }

    .font-display {
      font-family: 'Space Grotesk', sans-serif;
    }

    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }

    /* Screen Shake Animation for incorrect codes */
    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      10%, 30%, 50%, 70%, 90% { transform: translate(-8px, 0); }
      20%, 40%, 60%, 80% { transform: translate(8px, 0); }
    }

    .shake-anim {
      animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
    }

    /* Scan Laser Line animation */
    @keyframes scan {
      0% { top: 0%; }
      50% { top: 100%; }
      100% { top: 0%; }
    }

    .scan-line-anim {
      animation: scan 2.5s ease-in-out infinite;
    }

    /* Custom cyber buttons */
    .action-btn {
      background-color: rgba(16, 185, 129, 0.08);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.35);
      padding: 0.6rem 1.4rem;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 700;
      border-radius: 4px;
      transition: all 0.25s ease-in-out;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.05);
      backdrop-filter: blur(4px);
    }

    .action-btn:hover {
      background-color: #10b981;
      color: #08090a;
      border-color: #10b981;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
    }

    .action-btn:disabled {
      opacity: 0.3;
      pointer-events: none;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-[#030405] p-2 md:p-6 select-none overflow-hidden">

  <!-- Fixed 16:9 Aspect Ratio Frame Container -->
  <div 
    id="artifact" 
    class="relative w-full aspect-[16/9] max-w-[1200px] bg-[#08090a] text-[#c2c5c8] shadow-[0_0_60px_rgba(16,185,129,0.15)] overflow-hidden rounded-2xl border-[12px] border-[#1a1c1e] transition-all duration-500"
  >
    <!-- Immersive UI dotted grid pattern overlay -->
    <div class="absolute inset-0 opacity-10 pointer-events-none z-0" style="background-image: radial-gradient(#10b981 1px, transparent 1px); background-size: 20px 20px;"></div>

    <!-- Runic Calibration alignment rings fallback graphics -->
    <div class="absolute inset-0 opacity-[0.05] pointer-events-none -z-10 flex items-center justify-center">
      <svg class="w-[85%] h-[85%] text-[#10b981]" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="0.15">
        <circle cx="50" cy="50" r="46" stroke-dasharray="3 3" />
        <circle cx="50" cy="50" r="38" />
        <circle cx="50" cy="50" r="28" />
        <path d="M 50 0 L 50 100 M 0 50 L 100 50 M 15 15 L 85 85 M 15 85 L 85 15" />
        <polygon points="50,4 96,50 50,96 4,50" stroke-width="0.08" />
        <polygon points="50,12 88,50 50,88 12,50" stroke-width="0.08" />
      </svg>
    </div>

    <!-- Header Terminal Title -->
    <div class="absolute top-[4.5%] left-[15%] w-[70%] text-center pointer-events-none select-none z-10">
      <div class="text-[0.6vw] md:text-[0.7vw] uppercase tracking-[0.3em] text-[#10b981] font-bold mb-1 animate-pulse">
        System Status: Monitoring
      </div>
      <h1 class="text-[2.2vw] font-light tracking-[0.2em] text-white uppercase font-display leading-tight">
        КРИПТО-СНІГ QR <span class="text-[#10b981] opacity-50 font-mono text-[1.4vw] ml-1">v4.02</span>
      </h1>
      <p class="text-[0.7vw] text-[#10b981]/60 font-mono tracking-[0.35em] uppercase mt-1">
        ANCIENT ORNAMENT CRYPTO DECODER // SECURE TERMINAL
      </p>
    </div>

    <!-- Operator Auth stamp right -->
    <div class="absolute top-[4.5%] right-[3%] text-right pointer-events-none select-none z-10">
      <div class="text-[0.5vw] uppercase tracking-[0.2em] opacity-40">Operator Auth</div>
      <div class="text-[0.8vw] font-mono text-[#10b981]/80">DPT-993-XLS</div>
    </div>

    <!-- Left Lock Block (Sector Alpha) -->
    <div id="lock-left" class="absolute left-[30%] top-[70%] w-[10%] h-[22%] pointer-events-none flex flex-col items-center justify-center bg-[#0c0e10]/80 border border-[#10b981]/20 rounded-xl p-2 z-10 shadow-[0_0_15px_rgba(0,0,0,0.5)] transition-all duration-500">
      <!-- Icon Container -->
      <div id="lock-left-icon-container">
        <!-- Will be updated dynamically via JS -->
      </div>
      <span id="lock-left-label" class="text-[0.6vw] text-[#10b981]/80 mt-1 font-mono tracking-widest uppercase font-bold">SECTOR_ALPHA</span>
    </div>

    <!-- Right Lock Block (Sector Beta) -->
    <div id="lock-right" class="absolute left-[60%] top-[70%] w-[10%] h-[22%] pointer-events-none flex flex-col items-center justify-center bg-[#0c0e10]/80 border border-[#10b981]/20 rounded-xl p-2 z-10 shadow-[0_0_15px_rgba(0,0,0,0.5)] transition-all duration-500">
      <!-- Icon Container -->
      <div id="lock-right-icon-container">
        <!-- Will be updated dynamically via JS -->
      </div>
      <span id="lock-right-label" class="text-[0.6vw] text-[#10b981]/80 mt-1 font-mono tracking-widest uppercase font-bold">SECTOR_BETA</span>
    </div>

    <!-- --- DYNAMIC SECRET TEXT FIELD (#ui-text) --- -->
    <div 
      class="absolute transition-all duration-500 border border-[#10b981]/25 bg-[#0c0e10]/85 rounded-lg p-1 shadow-[0_0_15px_rgba(16,185,129,0.05)] focus-within:border-[#10b981]/60 focus-within:shadow-[0_0_20px_rgba(16,185,129,0.15)]"
      style="left: 26.5%; top: 23.5%; width: 47.2%; height: 6.5%; z-index: 5;"
    >
      <textarea 
        id="ui-text"
        placeholder="Введіть текст таємниці / Enter secret payload..."
        class="w-full h-full bg-transparent border-none text-[#10b981] placeholder-[#10b981]/30 font-mono resize-none outline-none text-[1.1vw] leading-[1.3] px-4 py-1 transition-all duration-500"
      ></textarea>
      
      <!-- Overlay lock notification when pending key input -->
      <div id="lock-overlay" class="hidden absolute inset-0 flex items-center justify-center bg-black/75 backdrop-blur-[1px] rounded border border-red-950/30 pointer-events-none">
        <span class="text-red-500 text-[0.8vw] font-mono tracking-[0.2em] uppercase flex items-center gap-2">
          <!-- ShieldAlert SVG -->
          <svg class="w-4 h-4 animate-pulse" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13c0 5-3.5 7.5-7.66 9.7a1 1 0 0 1-.68 0C7.5 20.5 4 18 4 13V6a1 1 0 0 1 .76-.97l8-2a1 1 0 0 1 .48 0l8 2A1 1 0 0 1 20 6z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>
          AWAITING CRYPTOGRAPHIC KEY VERIFICATION
        </span>
      </div>

      <!-- Success Decrypted Indicator -->
      <div id="decrypted-indicator" class="hidden absolute bottom-1 right-2 pointer-events-none">
        <span class="text-[#10b981] text-[0.6vw] font-mono tracking-widest uppercase flex items-center gap-1">
          <!-- Check SVG -->
          <svg class="w-3 h-3 animate-ping" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          PAYLOAD DECRYPTED
        </span>
      </div>
    </div>

    <!-- --- CENTRAL DECORATIVE ORNAMENT BOX (#ui-qr-wrapper) --- -->
    <div 
      id="ui-qr-wrapper"
      class="absolute flex items-center justify-center pointer-events-auto overflow-hidden transition-all duration-500 rounded-xl z-40 border border-[#10b981]/20 bg-[#0c0e10] shadow-[0_0_60px_rgba(0,0,0,0.85)]"
      style="left: 39.1%; top: 35.3%; width: 22.1%; height: 40.6%;"
    >
      <!-- Corner Highlights -->
      <div class="absolute top-0 left-0 w-4 h-4 border-t-2 border-l-2 border-[#10b981] pointer-events-none z-50"></div>
      <div class="absolute top-0 right-0 w-4 h-4 border-t-2 border-r-2 border-[#10b981] pointer-events-none z-50"></div>
      <div class="absolute bottom-0 left-0 w-4 h-4 border-b-2 border-l-2 border-[#10b981] pointer-events-none z-50"></div>
      <div class="absolute bottom-0 right-0 w-4 h-4 border-b-2 border-r-2 border-[#10b981] pointer-events-none z-50"></div>

      <!-- Standby Runic Seal Vector backdrop -->
      <div id="standby-seal" class="absolute inset-0 flex flex-col items-center justify-center text-center p-3 select-none pointer-events-none">
        <div class="w-[60%] h-[60%] border border-[#10b981]/20 rounded-full flex items-center justify-center opacity-30 animate-spin" style="animation-duration: 30s;">
          <svg class="w-full h-full text-[#10b981]" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path d="M12 2v20M2 12h20" stroke-width="0.5" />
            <circle cx="12" cy="12"
