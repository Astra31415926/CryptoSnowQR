<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoSnowQR Artifact</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        /* --- БАЗОВЫЙ КАРКАС ИНТЕРФЕЙСА --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #1a1510;
            font-family: 'Cinzel', serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        .crypto-container {
            position: relative;
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            background: url('bg1.jpg') center/cover no-repeat;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        #ui-text {
            position: absolute;
            left: 26.5%; top: 23.5%; width: 47.2%; height: 6.5%;
            font-size: 1.8vw; text-align: left; padding-left: 1.5vw; line-height: 1.2;
            background: transparent; border: none; color: #7fff00; resize: none; outline: none;
            font-family: inherit; z-index: 5;
        }

        #ui-pass {
            position: absolute;
            left: 35%; top: 82%; width: 30%; height: 5.5%;
            font-size: 1.6vw; text-align: center; letter-spacing: 0.3em;
            background: transparent; border: none; color: #7fff00; outline: none;
            font-family: inherit; z-index: 5;
        }

        /* --- ГРАФИЧЕСКИЕ СЛОИ-МАСКИ --- */
        .overlay-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; background-size: cover; background-position: center; background-repeat: no-repeat;
            opacity: 0;
        }

        #title-glow {
            background-image: url('bg3.jpg');
            clip-path: polygon(15% 0%, 85% 0%, 85% 20%, 15% 20%);
            z-index: 2; transition: opacity 0.1s ease-out;
        }
        .flicker-active { opacity: 0.5 !important; }

        #lock-left-glow {
            background-image: url('bg3.jpg');
            clip-path: polygon(30% 70%, 40% 70%, 40% 92%, 30% 92%);
            z-index: 3; transition: opacity 0.3s ease;
        }
        #lock-left-closed {
            background-image: url('bg.jpg');
            clip-path: polygon(30% 70%, 40% 70%, 40% 92%, 30% 92%);
            z-index: 3; transition: opacity 0.3s ease;
        }

        #lock-right-glow {
            background-image: url('bg3.jpg');
            clip-path: polygon(60% 70%, 70% 70%, 70% 92%, 60% 92%);
            z-index: 3; transition: opacity 0.3s ease;
        }
        #lock-right-closed {
            background-image: url('bg.jpg');
            clip-path: polygon(60% 70%, 70% 70%, 70% 92%, 60% 92%);
            z-index: 3; transition: opacity 0.3s ease;
        }

        /* --- КОНТЕЙНЕР И ХОЛСТ ОРНАМЕНТА --- */
        #ui-qr-wrapper {
            position: absolute !important; left: 39.1% !important; top: 35.3% !important;
            width: 22.1% !important; height: 40.6% !important;
            display: flex !important; justify-content: center !important; align-items: center !important;
            pointer-events: none; 
            /* ИЗМЕНЕНО: Фон по умолчанию вместо прозрачного */
            background: url('bg.jpg') center/cover no-repeat !important; 
            z-index: 4;
        }

        #canvas-create {
            width: 100% !important; height: auto !important; max-width: 100% !important; max-height: 100% !important;
            aspect-ratio: 1 / 1 !important; image-rendering: pixelated; image-rendering: crisp-edges;
            mix-blend-mode: soft-light; opacity: 0; transition: opacity 0.6s ease;
        }
        .show-canvas { opacity: 1 !important; }

        /* --- КНОПКИ УПРАВЛЕНИЯ --- */
        .action-btn {
            position: absolute; background: rgba(0,0,0,0.6); border: 1px solid rgba(127, 255, 0, 0.3);
            color: #7fff00; font-family: 'Cinzel', serif; font-weight: 700;
            padding: 1vw 2vw; cursor: pointer; transition: all 0.3s; border-radius: 4px; font-size: 1.2vw; z-index: 10;
        }
        .action-btn:hover { background: rgba(127, 255, 0, 0.2); box-shadow: 0 0 15px rgba(127, 255, 0, 0.4); }
        #btn-save { bottom: 3%; left: 3%; display: none; }
        #btn-scan { bottom: 3%; right: 3%; }

        /* --- МОДАЛЬНЫЕ ОКНА --- */
        .hidden { display: none !important; }
        .scan-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .scanner-box { position: relative; width: 100%; max-width: 400px; aspect-ratio: 1; background: #111; border-radius: 20px; overflow: hidden; border: 2px solid #39ff14; }
        .viewfinder-corners { position: absolute; inset: 20px; pointer-events: none; z-index: 15; }
        .corner { position: absolute; width: 30px; height: 30px; border-color: #39ff14; }
        .tl { top: 0; left: 0; border-top: 4px solid; border-left: 4px solid; border-radius: 5px 0 0 0; }
        .tr { top: 0; right: 0; border-top: 4px solid; border-right: 4px solid; border-radius: 0 5px 0 0; }
        .bl { bottom: 0; left: 0; border-bottom: 4px solid; border-left: 4px solid; border-radius: 0 0 0 5px; }
        .br { bottom: 0; right: 0; border-bottom: 4px solid; border-right: 4px solid; border-radius: 0 0 5px 0; }
        .viewfinder-hunting .corner { border-color: #fff; box-shadow: 0 0 20px #fff; }
        .scanner-controls { margin-top: 20px; display: flex; gap: 15px; width: 100%; max-width: 400px; }
        .scan-btn { flex: 1; padding: 15px; background: rgba(57, 255, 20, 0.1); border: 1px solid rgba(57, 255, 20, 0.3); color: #39ff14; font-family: 'Cinzel', serif; border-radius: 12px; cursor: pointer; font-size: 16px; }

        .spy-overlay { backdrop-filter: blur(8px); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); } 20%, 40%, 60%, 80% { transform: translateX(5px); } }
        .shake-anim { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        .spy-container { box-shadow: 0 0 40px rgba(57, 255, 20, 0.3); background: #111; border: 2px solid #39ff14; }
        @keyframes flash { 0% { opacity: 0; } 20% { opacity: 0.8; } 100% { opacity: 0; } }
        .flash-anim { animation: flash 0.3s ease-out; }
    </style>
</head>
<body>

    <div id="artifact" class="crypto-container
